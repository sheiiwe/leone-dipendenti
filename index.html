<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--red:#F21F14;--dark:#171819;--bg:#f4f5f6;--card:#fff;--text:#1a1a18;--muted:#8a8a82;--border:#e6e6e2}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
.hidden{display:none!important}
.topbar{background:var(--dark);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
.topbar .brand{font-weight:800;letter-spacing:.4px}.topbar .brand span{color:var(--red)}
.wrap{max-width:760px;margin:0 auto;padding:18px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.muted{color:var(--muted)}
.btn{background:var(--red);color:#fff;border:none;border-radius:9px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer}
.btn.ghost{background:#ececed;color:var(--text)}
.btn:disabled{opacity:.6}
input,.in{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:9px;font-size:14px;margin-top:4px;background:#fff;color:var(--text)}
label{font-size:12px;color:var(--muted);font-weight:600}
.msg{padding:10px 12px;border-radius:8px;font-size:13px;margin-top:10px}
.msg-ok{background:#dff5e3;color:#1a7a33}.msg-err{background:#fde3e1;color:#c0392b}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:s .7s linear infinite;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
.nav{display:flex;gap:4px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:49px;z-index:15;overflow-x:auto}
.nav button{flex:0 0 auto;background:none;border:none;border-bottom:2px solid transparent;padding:12px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
.nav button.on{color:var(--red);border-bottom-color:var(--red)}
.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f1ee;font-size:14px}
.kv .k{color:var(--muted)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px;border-bottom:2px solid var(--border);color:var(--muted);font-size:11px;text-transform:uppercase}
.tbl td{padding:8px;border-bottom:1px solid #f1f1ee}
h1,h2,h3{margin:0 0 10px}
a{color:var(--red)}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">LEONE <span>CONSULTING</span></span>
  <span style="font-size:13px;opacity:.8">Portale Dipendenti</span>
  <button id="btn-logout" class="btn ghost hidden" style="margin-left:auto;padding:7px 12px;font-size:12px" onclick="logout()">Esci</button>
</div>

<!-- AUTH -->
<div id="screen-auth" class="wrap">
  <div class="card" style="max-width:420px;margin:40px auto">
    <h2>Accesso dipendenti</h2>
    <p class="muted" style="font-size:13px;margin-top:0">Accedi con la tua email aziendale. Al primo accesso imposta la password: la tua richiesta verrà approvata da Leone Consulting.</p>
    <div style="margin-top:12px"><label>Email</label><input id="lg-email" type="email" placeholder="nome@email.com"></div>
    <div style="margin-top:10px"><label>Password</label><input id="lg-pass" type="password" placeholder="••••••••"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn" id="btn-login" onclick="login()" style="flex:1">Accedi</button>
      <button class="btn ghost" id="btn-signup" onclick="signup()" style="flex:1">Primo accesso</button>
    </div>
    <div id="login-msg"></div>
  </div>
</div>

<!-- NAV + APP -->
<div id="mainnav" class="nav hidden">
  <button id="nv-profilo" class="on" onclick="vai('profilo')">Profilo</button>
  <button id="nv-bacheca" onclick="vai('bacheca')">Comunicazioni</button>
  <button id="nv-buste" onclick="vai('buste')">Buste paga</button>
</div>

<div id="screen-profilo" class="wrap hidden"></div>
<div id="screen-bacheca" class="wrap hidden"><div id="bacheca-lista"></div></div>
<div id="screen-buste" class="wrap hidden"><div id="buste-lista"></div></div>

<script>
const SUPA_URL='https://uljdbdbkiulbcquuhfwd.supabase.co'
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsamRiZGJraXVsYmNxdXVoZndkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1Nzk3NjcsImV4cCI6MjA5NjE1NTc2N30.TsTSIwUqawsT6M_pwUXjRutCSHToJdVfGF3FxqG3TUA'
const { createClient } = supabase
const db = createClient(SUPA_URL, SUPA_KEY, { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true } })
let MIO_EMAIL='', MIO_D=null
const PORTALE_URL='https://dipendenti.leoneconsultingitalia.it'

function esc(s){ return (s==null?'':String(s)).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])) }
function eur(n){ const x=Number(n)||0; return '\u20ac '+x.toLocaleString('it-IT',{minimumFractionDigits:0,maximumFractionDigits:2}) }
function show(id){ const e=document.getElementById(id); if(e) e.classList.remove('hidden') }
function hide(id){ const e=document.getElementById(id); if(e) e.classList.add('hidden') }
function msg(box,txt,ok){ const e=document.getElementById(box); if(e) e.innerHTML=txt?('<div class="msg '+(ok?'msg-ok':'msg-err')+'">'+esc(txt)+'</div>'):'' }
function tradErr(e){ const m=(e&&e.message||'').toLowerCase()
  if(m.includes('invalid login')) return 'Email o password non corretti.'
  if(m.includes('already registered')) return 'Questa email \u00e8 gi\u00e0 registrata: premi "Accedi".'
  if(m.includes('not confirmed')) return 'Devi prima confermare la tua email dal link che ti abbiamo inviato.'
  return (e&&e.message)||'Errore. Riprova.' }

// ---- AUTH ----
async function login(){
  const email=(document.getElementById('lg-email').value||'').trim().toLowerCase()
  const pass=document.getElementById('lg-pass').value||''
  if(!email||!pass){ msg('login-msg','Inserisci email e password.'); return }
  const b=document.getElementById('btn-login'); b.disabled=true; b.innerHTML='<span class="spin"></span>'
  try{ const { data, error } = await db.auth.signInWithPassword({ email, password:pass }); if(error) throw error; await avvia(data.session) }
  catch(e){ msg('login-msg', tradErr(e)) }
  b.disabled=false; b.textContent='Accedi'
}
async function signup(){
  const email=(document.getElementById('lg-email').value||'').trim().toLowerCase()
  const pass=document.getElementById('lg-pass').value||''
  if(!email||pass.length<6){ msg('login-msg','Inserisci email e una password di almeno 6 caratteri.'); return }
  const b=document.getElementById('btn-signup'); b.disabled=true; b.innerHTML='<span class="spin"></span>'
  try{ const { data, error } = await db.auth.signUp({ email, password:pass, options:{ emailRedirectTo:PORTALE_URL } }); if(error) throw error
    try{ await db.from('portale_accessi').upsert({ email, nome:'', area:'dipendente', stato:'in_attesa', approvato:false }, { onConflict:'email', ignoreDuplicates:true }) }catch(e){ console.error('richiesta accesso dipendente:',e) }
    if(data && data.session){ await avvia(data.session) } else { msg('login-msg','Richiesta inviata! Conferma la tua email dal link che ti abbiamo inviato, poi attendi l\u0027approvazione di Leone Consulting.', true) }
  }catch(e){ msg('login-msg', tradErr(e)) }
  b.disabled=false; b.textContent='Primo accesso'
}
async function logout(){ try{ await db.auth.signOut() }catch(e){} location.reload() }

async function avvia(session){
  if(!session) return
  MIO_EMAIL=(session.user.email||'').toLowerCase()
  // Gate: deve essere approvato da Leone Consulting
  let approvato=false
  try{ const a=await db.from('portale_accessi').select('*'); approvato=(a.data||[]).some(r=>(r.email||'').toLowerCase()===MIO_EMAIL && r.approvato===true) }catch(e){}
  hide('screen-auth'); show('btn-logout')
  if(!approvato){
    show('screen-profilo')
    document.getElementById('screen-profilo').innerHTML='<div class="card"><h2>Accesso in attesa di approvazione</h2><p class="muted">La tua richiesta di accesso \u00e8 stata registrata ed \u00e8 <strong>in attesa di approvazione</strong> da parte di Leone Consulting. Riceverai conferma a breve. Per info: amministrazione@leoneconsultingitalia.it</p><button class="btn" style="margin-top:12px" onclick="logout()">Esci</button></div>'
    return
  }
  // Collega la scheda dipendente (match preciso per email, niente fallback)
  let d=null
  try{ const r=await db.from('dipendenti').select('*'); d=(r.data||[]).map(x=>({_id:x.id,...x.data})).find(x=>(x.email||'').toLowerCase()===MIO_EMAIL)||null }catch(e){}
  if(!d){
    show('screen-profilo')
    document.getElementById('screen-profilo').innerHTML='<div class="card"><h2>Account approvato</h2><p class="muted">Il tuo accesso \u00e8 approvato ma non risulta ancora collegato a una scheda dipendente. Contatta Leone Consulting indicando questa email: <strong>'+esc(MIO_EMAIL)+'</strong></p><button class="btn" style="margin-top:12px" onclick="logout()">Esci</button></div>'
    return
  }
  MIO_D=d
  show('mainnav'); vai('profilo')
}

// ---- NAV ----
const _NV=['profilo','bacheca','buste']
function vai(t){
  _NV.forEach(x=>{ const b=document.getElementById('nv-'+x); if(b) b.classList.toggle('on',x===t); const s=document.getElementById('screen-'+x); if(s) s.classList.toggle('hidden',x!==t) })
  window.scrollTo({top:0})
  if(t==='profilo') renderProfilo()
  if(t==='bacheca') caricaBacheca()
  if(t==='buste') caricaBuste()
}

// ---- PROFILO ----
function renderProfilo(){
  const d=MIO_D||{}
  const row=(k,v)=> v?('<div class="kv"><span class="k">'+k+'</span><span>'+esc(v)+'</span></div>'):''
  document.getElementById('screen-profilo').innerHTML=
    '<div class="card"><h2>'+esc(d.nome||'Dipendente')+'</h2>'+
    row('Email', d.email)+row('Telefono', d.tel)+row('Codice fiscale', d.cf)+
    row('Ruolo / mansione', d.ruolo)+row('Tipo impiego', d.tipo)+row('CCNL', d.ccnl)+
    row('Data inizio', d.inizio)+row('Data fine', d.fine)+row('IBAN', d.iban)+
    row('Citt\u00e0', d.citta)+row('Indirizzo', d.indirizzo)+
    '<p class="muted" style="font-size:12px;margin-top:14px">Per correggere i tuoi dati, contatta Leone Consulting.</p></div>'
}

// ---- BACHECA (comunicazioni) ----
function _vis(aree){ if(!aree||!aree.length) return true; return aree.includes('dipendente')||aree.includes('dipendenti')||aree.includes('tutti') }
async function caricaBacheca(){
  const box=document.getElementById('bacheca-lista'); if(!box) return
  box.innerHTML='<div class="card muted">Caricamento\u2026</div>'
  let posts=[]
  try{ const r=await db.from('bacheca').select('*').order('created_at',{ascending:false}); posts=(r.data||[]).map(x=>({_id:x.id,created:x.created_at,...(x.data||{})})) }
  catch(e){ box.innerHTML='<div class="card muted">Comunicazioni non disponibili.</div>'; return }
  posts=posts.filter(p=>_vis(p.aree)).filter(p=>(p.titolo&&(''+p.titolo).trim())||(p.testo&&(''+p.testo).trim())||(p.media&&p.media.length))
  posts.sort((a,b)=>(b.pin?1:0)-(a.pin?1:0))
  if(!posts.length){ box.innerHTML='<div class="card muted">Nessuna comunicazione al momento.</div>'; return }
  box.innerHTML=posts.map(p=>{
    const d=p.data||(p.created?new Date(p.created).toLocaleDateString('it-IT'):'')
    const isAdm=!!p.isAdmin
    const autore=isAdm?'Leone Consulting':(p.autoreNome||'Leone Consulting')
    const ini=(autore||'').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase()||'LC'
    return '<div class="card" style="border-left:3px solid var(--red)">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="width:36px;height:36px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700">'+ini+'</div>'+
      '<div style="flex:1;min-width:0"><div style="font-weight:700">'+esc(autore)+(p.pin?' \ud83d\udccc':'')+'</div><div style="font-size:11px;color:var(--muted)">'+esc(d)+'</div></div></div>'+
      (p.titolo?'<div style="font-weight:700;margin-bottom:4px">'+esc(p.titolo)+'</div>':'')+
      '<div style="color:#444;white-space:pre-wrap;line-height:1.5">'+esc(p.testo||'')+'</div>'+
      ((p.media&&p.media.length)?'<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px">'+p.media.map(m=>m.t==='vid'?'<video controls preload="metadata" src="'+m.url+'" style="max-width:100%;max-height:320px;border-radius:8px;background:#000"></video>':'<img src="'+m.url+'" style="max-width:100%;max-height:320px;border-radius:8px;object-fit:cover">').join('')+'</div>':'')+
    '</div>'
  }).join('')
}

// ---- BUSTE PAGA (elenco) ----
async function caricaBuste(){
  const box=document.getElementById('buste-lista'); if(!box) return
  box.innerHTML='<div class="card muted">Caricamento\u2026</div>'
  let buste=[]
  try{ const r=await db.from('buste_paga').select('*').order('created_at',{ascending:false}); buste=(r.data||[]).map(x=>({_id:x.id,created:x.created_at,...(x.data||{})})) }
  catch(e){ box.innerHTML='<div class="card muted">Buste paga non disponibili.</div>'; return }
  const mioNome=((MIO_D&&MIO_D.nome)||'').trim().toLowerCase()
  buste=buste.filter(b=>((b.nomeDip||'').trim().toLowerCase())===mioNome)
  if(!buste.length){ box.innerHTML='<div class="card"><h2>Buste paga</h2><p class="muted">Nessuna busta paga disponibile al momento.</p></div>'; return }
  let h='<div class="card"><h2>Le tue buste paga</h2><table class="tbl"><thead><tr><th>Periodo</th><th>Ore</th><th>Netto in busta</th></tr></thead><tbody>'
  for(const b of buste){
    const netto = b.netto!=null?b.netto:(b.nettoBusta!=null?b.nettoBusta:b.netto_in_busta)
    h+='<tr><td>'+esc(b.mese||'')+'</td><td>'+esc(b.ore!=null?b.ore:'')+'</td><td>'+(netto!=null?eur(netto):'\u2014')+'</td></tr>'
  }
  h+='</tbody></table><p class="muted" style="font-size:12px;margin-top:12px">Il cedolino PDF ufficiale ti viene consegnato dall\u0027ufficio. La versione scaricabile dal portale arriver\u00e0 a breve.</p></div>'
  box.innerHTML=h
}
